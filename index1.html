  <body>
    <div class="app">

              alt="icon"
            />
            <div class="bookmark__titles">
              <h2>Hillel</h2>
              <p>Loerm</p>
            </div>
            </div>
            <button>...</button>

            <div class="bookmark__body">
              <p class="bookmark__desc">sdvxfvcfgbgvhnvhjn hj nbhj b</p>
              <ul>
                <li class="tag">Perf</li>
                <li class="tag">Learning</li>
                <li class="tag">Tips</li>

          </div>
        </article>
